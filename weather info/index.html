<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Weather Dashboard</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for sleek, modern icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background layers for theme rendering -->
    <div id="weather-bg" class="weather-bg sunny"></div>
    
    <!-- Visual Effect container (for rain drops, clouds, glowing light) entirely managed by JS/CSS -->
    <div id="weather-effects" class="weather-effects"></div>

    <div class="app-container">
        <!-- Main Weather Card using Glassmorphism -->
        <main class="weather-card glassmorphism fade-in">
            <!-- Header: City and Date Info -->
            <header class="header">
                <div>
                    <h1 id="city"><i class="fas fa-map-marker-alt"></i> --</h1>
                    <p id="date-time">--</p>
                </div>
                <div class="toggle-container">
                    <!-- Button to toggle units -->
                    <button id="toggle-unit" class="btn glass-btn">°C / °F</button>
                </div>
            </header>

            <!-- Current Weather Core Display -->
            <section class="current-weather">
                <div class="main-info">
                    <!-- Floating Icon container -->
                    <div id="icon-container" class="icon-container">
                        <i id="main-icon" class="fas fa-sun"></i>
                    </div>
                    <!-- Temperature numbers and unit -->
                    <div class="temp-block">
                        <h2 id="temperature" class="temp-value">--</h2>
                        <span id="temp-unit" class="temp-unit">°C</span>
                    </div>
                </div>
                <!-- Condition Description and Feels Like -->
                <div class="condition-info">
                    <p id="condition" class="condition-text">--</p>
                    <p id="feels-like" class="feels-like">Feels like: <span>--</span></p>
                </div>
            </section>

            <!-- Weather Details Grid -->
            <section class="weather-details">
                <div class="detail-item glassmorphism-sub">
                    <i class="fas fa-tint"></i>
                    <div>
                        <p class="label">Humidity</p>
                        <p id="humidity" class="value">--</p>
                    </div>
                </div>
                <div class="detail-item glassmorphism-sub">
                    <i class="fas fa-wind"></i>
                    <div>
                        <p class="label">Wind Speed</p>
                        <p id="wind-speed" class="value">--</p>
                    </div>
                </div>
                <div class="detail-item glassmorphism-sub">
                    <i class="fas fa-tachometer-alt"></i>
                    <div>
                        <p class="label">Pressure</p>
                        <p id="pressure" class="value">--</p>
                    </div>
                </div>
            </section>

            <!-- 5-Day Forecast -->
            <section class="forecast">
                <h3>5-Day Forecast</h3>
                <div id="forecast-container" class="forecast-list">
                    <!-- Forecast items will be generated dynamically by JS -->
                </div>
            </section>
            
            <!-- Hidden API/Controls to simulate different weather themes -->
            <section class="simulator-controls">
                <p>Simulate Weather</p>
                <div class="control-buttons">
                    <button class="btn glass-btn" onclick="app.setWeather('sunny')">☀️ Sunny</button>
                    <button class="btn glass-btn" onclick="app.setWeather('rainy')">🌧️ Rainy</button>
                    <button class="btn glass-btn" onclick="app.setWeather('cloudy')">☁️ Cloudy</button>
                    <button class="btn glass-btn" onclick="app.setWeather('night')">🌙 Night</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Script connection at the body end -->
    <script src="script.js"></script>
</body>
</html>
